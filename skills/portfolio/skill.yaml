name: fintech-portfolio
version: "1.0.0"
description: "Portfolio tracking, rebalancing, and performance reporting"
author: "fintech-team"

triggers:
  - type: cron
    schedule: "0 6 * * *"
    action: heartbeat
  - type: message
    patterns:
      - "portfolio *"
      - "rebalance *"
      - "allocation *"
      - "performance *"
      - "holdings"

tools:
  - name: get_portfolio
    description: "Fetch current portfolio holdings and values"
    handler: "skills.portfolio.handlers:get_portfolio"
  - name: propose_rebalance
    description: "Calculate and propose rebalancing trades"
    handler: "skills.portfolio.handlers:propose_rebalance"
    requires_approval: always
  - name: execute_rebalance
    description: "Execute an approved rebalancing plan"
    handler: "skills.portfolio.handlers:execute_rebalance"
    requires_approval: always
  - name: performance_report
    description: "Generate portfolio performance report"
    handler: "skills.portfolio.handlers:performance_report"

permissions:
  - network: true
  - filesystem: read
