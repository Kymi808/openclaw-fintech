global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "fintech-gateway"
    static_configs:
      - targets: ["openclaw-gateway:9090"]
    scrape_interval: 10s

  - job_name: "ollama"
    static_configs:
      - targets: ["ollama:11434"]
    scrape_interval: 30s
    metrics_path: /api/tags
