services:
  # OpenClaw Gateway
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: fintech-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"   # Gateway WebSocket
      - "3000:3000"     # Web Control UI
      - "9090:9090"     # Prometheus metrics endpoint
    volumes:
      - ../gateway/config.yaml:/app/config.yaml:ro
      - ../workspaces:/app/workspaces
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ../data:/app/data
      - gateway-data:/app/gateway-data
    env_file:
      - ../gateway/.env
    environment:
      - OPENCLAW_CONFIG=/app/config.yaml
      - OPENCLAW_SKILLS_PATH=/app/skills
      - OPENCLAW_WORKSPACES_PATH=/app/workspaces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fintech-net

  # Optional local LLMs run on the host, not in this Compose stack.
  # Gateway-compatible tooling can reach them through host.docker.internal.

  # Prometheus — Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: fintech-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    networks:
      - fintech-net

  # Grafana — Dashboards and alerting
  grafana:
    image: grafana/grafana:latest
    container_name: fintech-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_ALERTING_ENABLED=true
    depends_on:
      - prometheus
    networks:
      - fintech-net

  # Log viewer
  log-viewer:
    image: datalust/seq:latest
    container_name: fintech-logs
    restart: unless-stopped
    ports:
      - "5341:5341"   # Ingestion
      - "8080:80"     # Web UI
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    networks:
      - fintech-net

volumes:
  gateway-data:
  seq-data:
  prometheus-data:
  grafana-data:

networks:
  fintech-net:
    driver: bridge
