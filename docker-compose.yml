services:
  trading-scheduler:
    build: .
    container_name: openclaw-scheduler
    env_file: gateway/.env
    environment:
      - PYTHONPATH=/app
      - TZ=America/New_York
      - TRADING_ENV=paper
    volumes:
      - ./data:/app/data                    # persist SQLite DBs
      - ./workspaces:/app/workspaces        # persist agent state
      - ./logs:/app/logs                    # persist log files
    restart: unless-stopped
    command: ["python", "-m", "skills.orchestrator.scheduler"]

  cli:
    build: .
    container_name: openclaw-cli
    env_file: gateway/.env
    environment:
      - PYTHONPATH=/app
      - TRADING_ENV=paper
    volumes:
      - ./data:/app/data
      - ./workspaces:/app/workspaces
    stdin_open: true
    tty: true
    command: ["python", "cli.py"]
    profiles:
      - cli  # start with: docker compose --profile cli run --rm cli
