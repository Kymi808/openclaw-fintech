name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test and Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Prepare local env template
        run: cp gateway/.env.example gateway/.env

      - name: Check for tracked secret patterns
        run: |
          ! git grep -I -n -E 'sk-ant-api|PK[A-Z0-9]{18,}|-----BEGIN [A-Z ]*PRIVATE KEY-----' -- . ':!:.github/workflows/ci.yml'

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Compile
        run: python -m compileall cli.py gateway_bot.py skills tests

      - name: Validate Compose files
        run: |
          docker compose config --services
          docker compose -f docker/docker-compose.yaml config --services

      - name: Build scheduler image
        run: docker build .
